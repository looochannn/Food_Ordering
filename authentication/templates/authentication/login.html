{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">
                    Login
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="username"
                        class="form-control mb-3"
                        placeholder="Username"
                    >

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-3"
                        placeholder="Password"
                    >

                    <button
                        class="btn btn-success w-100"
                    >
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
